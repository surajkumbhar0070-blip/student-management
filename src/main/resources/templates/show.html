<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            min-height:100vh;
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            color:white;
            padding:40px;
        }

        /* HEADER */
        h1{
            text-align:center;
            font-size:34px;
            margin-bottom:25px;
            font-weight:700;
            letter-spacing:1px;
            color:#e0e7ff;
        }

        /* TABLE WRAPPER */
        .table-container{
            width:95%;
            margin:auto;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border-radius:18px;
            padding:20px;
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }

        /* TABLE */
        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
        }

        th{
            padding:15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color:white;
            font-size:14px;
            text-transform:uppercase;
        }

        td{
            padding:14px;
            text-align:center;
            background: rgba(255,255,255,0.03);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        tr:hover td{
            background: rgba(255,255,255,0.08);
        }

        /* BUTTONS */
        .btn{
            padding:7px 14px;
            border:none;
            border-radius:10px;
            font-size:13px;
            transition:0.3s;
            cursor:pointer;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        .edit{
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color:white;
        }

        .delete{
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color:white;
        }

        /* BACK BUTTON */
        .back-btn{
            position:absolute;
            top:20px;
            left:20px;
            padding:10px 16px;
            border-radius:12px;
            background: rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            color:white;
        }

        /* MODAL STYLE */
        .modal-content{
            background: #0f172a;
            color:white;
            border-radius:15px;
            border:1px solid rgba(255,255,255,0.1);
        }

        .form-control{
            background: rgba(255,255,255,0.05);
            border:none;
            color:white;
        }

        .form-control:focus{
            background: rgba(255,255,255,0.1);
            color:white;
            box-shadow:none;
        }

    </style>
</head>

<body>

<a href="/previous">
    <button class="back-btn">← Back</button>
</a>

<h1>⚡ Student Dashboard</h1>

<div class="table-container">

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Course</th>
            <th>Action</th>
        </tr>

        <tr th:each="s : ${student}">

            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.email}"></td>
            <td th:text="${s.age}"></td>
            <td th:text="${s.course}"></td>

            <td>

                <button class="btn edit"
                        data-bs-toggle="modal"
                        data-bs-target="#editModal"
                        th:attr="onclick=|fillEditForm(${s.id}, '${s.name}', '${s.email}', ${s.age}, '${s.course}')|">
                    Edit
                </button>

                <a th:href="@{'/delete/' + ${s.id}}">
                    <button class="btn delete">Delete</button>
                </a>

            </td>

        </tr>

    </table>

</div>

<!-- MODAL -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog">

        <div class="modal-content p-3">

            <h5 class="text-center mb-3">Update Student</h5>

            <form action="/update" method="post">

                <input type="hidden" id="editId" name="id">

                <input class="form-control mb-2" id="editName" name="name" placeholder="Name">
                <input class="form-control mb-2" id="editEmail" name="email" placeholder="Email">
                <input class="form-control mb-2" id="editAge" name="age" placeholder="Age">
                <input class="form-control mb-2" id="editCourse" name="course" placeholder="Course">

                <button class="btn btn-success w-100">Update</button>

            </form>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function fillEditForm(id,name,email,age,course){
        document.getElementById("editId").value=id;
        document.getElementById("editName").value=name;
        document.getElementById("editEmail").value=email;
        document.getElementById("editAge").value=age;
        document.getElementById("editCourse").value=course;
    }
</script>

</body>
</html>
